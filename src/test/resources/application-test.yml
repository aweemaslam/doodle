spring:
  application:
    name: doodle
  datasource:
    url: jdbc:h2:mem:doodle{random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS doodle
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      schema: doodle
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:db/changelog/main-changelog.xml
    default-schema: doodle
    liquibase-schema: doodle
    enabled: true
  task:
    scheduling:
      enabled: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    topic:
      book-slot-event: book-slot-event-topic

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        acks: all
        enable.idempotence: true
        retries: 5

    consumer:
      group-id: booking-persistence-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: com.caorderapi.kafka.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.doodle.kafka.model.BookingEvent

logging:
  level:
    com.ca.orderapi: INFO
    org.hibernate.SQL: DEBUG

